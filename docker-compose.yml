services:
  db:
    image: postgres:17
    container_name: tracker_db
    environment:
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_pass
      POSTGRES_DB: tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data


  redis:
    image: redis:7
    container_name: tracker_redis
    ports:
      - "6379:6379"


volumes:
  pgdata: